<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block page_title %}{{ title }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
  <link rel="stylesheet" href="{{ prefix }}/static/panel.css" />
</head>

<body>
  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="{{ prefix }}/" class="brand">
          <span class="brand-icon">◈</span>
          <span class="brand-name">{{ title }}</span>
        </a>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <span class="theme-icon-light">☀</span>
          <span class="theme-icon-dark">◑</span>
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-label">Tables</div>
        {% for t in tables %}
        <a href="{{ prefix }}/table/{{ t.name }}"
          class="nav-item {% if table_info is defined and table_info.name == t.name %}active{% endif %}">
          <span class="nav-item-name">{{ t.name }}</span>
          <span class="nav-item-count">{{ t.row_count }}</span>
        </a>
        {% endfor %}
      </nav>

      <div class="sidebar-footer">
        {% if read_only %}
        <span class="badge-readonly">read-only</span>
        {% endif %}
        <a href="https://github.com/purvaspatel" target="_blank" rel="noopener" class="sidebar-author"
          title="Author: Purva Patel">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path
              d="M12 2C6.477 2 2 6.484 2 12.021c0 4.428 2.865 8.184 6.839 9.504.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.004.07 1.532 1.032 1.532 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.026 2.747-1.026.546 1.378.202 2.397.1 2.65.64.7 1.028 1.595 1.028 2.688 0 3.847-2.338 4.695-4.566 4.944.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.2 22 16.447 22 12.021 22 6.484 17.523 2 12 2z" />
          </svg>
          Purva Patel
        </a>
        <a href="https://github.com/purvaspatel/sqlite_webpanel" target="_blank" rel="noopener" class="sidebar-version">sqlite_webpanel v0.0.1</a>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="{{ prefix }}/static/panel.js"></script>
</body>

</html>
